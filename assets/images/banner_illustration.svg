<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" fill="none">

  <!-- Road surface -->
  <rect x="0" y="113" width="400" height="47" fill="white" fill-opacity="0.07"/>

  <!-- Road center-line dashes -->
  <rect x="10"  y="135" width="32" height="3" rx="1.5" fill="white" fill-opacity="0.18"/>
  <rect x="58"  y="135" width="32" height="3" rx="1.5" fill="white" fill-opacity="0.18"/>
  <rect x="106" y="135" width="32" height="3" rx="1.5" fill="white" fill-opacity="0.18"/>
  <rect x="154" y="135" width="32" height="3" rx="1.5" fill="white" fill-opacity="0.18"/>
  <rect x="202" y="135" width="32" height="3" rx="1.5" fill="white" fill-opacity="0.18"/>
  <rect x="250" y="135" width="32" height="3" rx="1.5" fill="white" fill-opacity="0.18"/>
  <rect x="298" y="135" width="32" height="3" rx="1.5" fill="white" fill-opacity="0.18"/>
  <rect x="346" y="135" width="32" height="3" rx="1.5" fill="white" fill-opacity="0.18"/>

  <!-- Distant hills -->
  <ellipse cx="60"  cy="120" rx="90"  ry="28" fill="white" fill-opacity="0.04"/>
  <ellipse cx="360" cy="118" rx="75"  ry="24" fill="white" fill-opacity="0.04"/>

  <!-- Bus body -->
  <rect x="102" y="53" width="208" height="62" rx="9" fill="white" fill-opacity="0.13"/>
  <!-- Bus roof -->
  <rect x="112" y="46" width="180" height="13" rx="7" fill="white" fill-opacity="0.10"/>
  <!-- Luggage bay stripe -->
  <rect x="110" y="107" width="192" height="10" rx="3" fill="white" fill-opacity="0.06"/>

  <!-- Windows — 4 panes -->
  <rect x="118" y="62" width="29" height="23" rx="4" fill="white" fill-opacity="0.30"/>
  <rect x="155" y="62" width="29" height="23" rx="4" fill="white" fill-opacity="0.30"/>
  <rect x="192" y="62" width="29" height="23" rx="4" fill="white" fill-opacity="0.30"/>
  <rect x="229" y="62" width="29" height="23" rx="4" fill="white" fill-opacity="0.30"/>

  <!-- Destination board on roof -->
  <rect x="150" y="46" width="72" height="10" rx="3" fill="white" fill-opacity="0.09"/>

  <!-- Front section (windshield side) -->
  <rect x="268" y="53" width="40" height="62" rx="9" fill="white" fill-opacity="0.08"/>
  <!-- Front windshield glass -->
  <rect x="271" y="59" width="25" height="37" rx="5" fill="white" fill-opacity="0.33"/>
  <!-- Upper headlight -->
  <rect x="299" y="63" width="7" height="5" rx="2" fill="white" fill-opacity="0.80"/>
  <!-- Lower fog light -->
  <rect x="299" y="80" width="7" height="5" rx="2" fill="white" fill-opacity="0.55"/>
  <!-- Grille lines -->
  <rect x="299" y="92" width="7" height="3" rx="1" fill="white" fill-opacity="0.30"/>
  <rect x="299" y="97" width="7" height="3" rx="1" fill="white" fill-opacity="0.22"/>
  <!-- Front bumper -->
  <rect x="270" y="108" width="38" height="6" rx="3" fill="white" fill-opacity="0.14"/>

  <!-- Wheels -->
  <circle cx="147" cy="117" r="14" fill="white" fill-opacity="0.14"/>
  <circle cx="147" cy="117" r="7"  fill="white" fill-opacity="0.08"/>
  <circle cx="260" cy="117" r="14" fill="white" fill-opacity="0.14"/>
  <circle cx="260" cy="117" r="7"  fill="white" fill-opacity="0.08"/>

  <!-- Motion lines (bus is moving right) -->
  <line x1="14"  y1="70" x2="87" y2="70" stroke="white" stroke-opacity="0.20" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="6"   y1="82" x2="87" y2="82" stroke="white" stroke-opacity="0.14" stroke-width="2.0" stroke-linecap="round"/>
  <line x1="18"  y1="94" x2="87" y2="94" stroke="white" stroke-opacity="0.09" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Decorative stars / dots -->
  <circle cx="340" cy="18" r="2"   fill="white" fill-opacity="0.28"/>
  <circle cx="368" cy="7"  r="1.5" fill="white" fill-opacity="0.20"/>
  <circle cx="385" cy="30" r="1"   fill="white" fill-opacity="0.22"/>
  <circle cx="314" cy="12" r="1.5" fill="white" fill-opacity="0.18"/>
  <circle cx="22"  cy="14" r="1.5" fill="white" fill-opacity="0.18"/>
  <circle cx="44"  cy="28" r="1"   fill="white" fill-opacity="0.14"/>
  <circle cx="62"  cy="10" r="1"   fill="white" fill-opacity="0.18"/>

</svg>
